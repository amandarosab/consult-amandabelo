<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://cdn.contentful.com; frame-src https://www.linkedin.com; frame-ancestors 'none';" />

    <!-- SEO -->
    <title>Amanda Belo | Consultoria de carreira e RH </title>
    <meta name="description" content="Otimização de currículo, LinkedIn e preparação para entrevistas. +100 profissionais atendidos. Método, dados e 5+ anos em gestão de pessoas." />
    <link rel="canonical" href="https://www.amandabelo.com.br/" />
 
    <!-- Open Graph -->
    <meta property="og:title" content="Consultoria de Carreira e RH" />
    <meta property="og:description" content="Currículo, LinkedIn e entrevistas com quem entende de RH de verdade." />
    <meta property="og:image" content="https://www.amandabelo.com.br/og-image.jpg" />
    <meta property="og:url" content="https://www.amandabelo.com.br/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
 
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Amanda Belo | Consultoria de Carreira e RH" />
    <meta name="twitter:description" content="Currículo, LinkedIn e entrevistas com quem entende de RH de verdade." />
 
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
 
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
 
    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Amanda Belo Consultoria",
      "description": "Consultoria de RH, gestão de carreira, otimização de currículo e LinkedIn, preparação para entrevistas.",
      "url": "https://www.amandabelo.com.br",
      "telephone": "+55-11-91062-3871",
      "email": "amandabelo.contato@outlook.com",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "areaServed": { "@type": "Country", "name": "Brasil" },
      "priceRange": "R$110–R$130",
      "founder": {
        "@type": "Person",
        "name": "Amanda Belo",
        "jobTitle": "Consultora de RH e Gestão de Carreira"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços de Carreira",
        "itemListElement": [
          { "@type": "Offer", "name": "Otimização estratégica de LinkedIn", "price": "110.00", "priceCurrency": "BRL" },
          { "@type": "Offer", "name": "Otimização de currículo (Foco em ATS)", "price": "115.00", "priceCurrency": "BRL" },
          { "@type": "Offer", "name": "Preparação para entrevista comportamental", "price": "115.00", "priceCurrency": "BRL" },
          { "@type": "Offer", "name": "Preparação para entrevista técnica", "price": "130.00", "priceCurrency": "BRL" }
        ]
      },
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "5", "reviewCount": "100", "bestRating": "5" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
